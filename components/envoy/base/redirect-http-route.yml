apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-redirect
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: envoy-gateway
      sectionName: http-main
  hostnames:
    - "localhost"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https