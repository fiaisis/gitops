apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  listeners:
  - name: http-main
    hostname: management.reduce.isis.cclrc.ac.uk
  - name: https-main
    hostname: management.reduce.isis.cclrc.ac.uk
    tls:
      certificateRefs:
        - group: ""
          kind: Secret
          name: management-reduce-isis-tls