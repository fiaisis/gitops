      labels:
        app: fia-auth
    spec:
      containers:
        - name: fia-auth
          image: ghcr.io/fiaisis/fia-auth@sha256:fd6ee87b2f23c1f4fb54867ae9d6ef8fca09ff1f2cd8d0377e490d92bedee6e1
