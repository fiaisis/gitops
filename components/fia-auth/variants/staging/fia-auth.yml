---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fia-auth
  namespace: fia
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: fia-auth
          env:
            - name: ALLOCATIONS_URL
              value: https://devapi.facilities.rl.ac.uk/proposal-allocations/graphql
            - name: UOWS_URL
              value: https://api.facilities.rl.ac.uk/users-service
            - name: DB_IP
              value: dbspg-dfndev.fds.rl.ac.uk # Staging
              # value: dbspgha01.fds.rl.ac.uk # Production
            - name: DB_PORT
              value: "6432"
