---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:53e0a832fb8b5192c3276c54b5462c7f86f94b842324ec617f68b1549666de8c
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
