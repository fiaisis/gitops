---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:eb51f28a73253be07f0070723ef1eb9e6ab0bb9e5fc27a5a0a49e184bf546e69
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
