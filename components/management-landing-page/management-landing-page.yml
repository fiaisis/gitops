---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:9f29d6025b31859a6b10f38999d46b9005a1a1414998220674993de262442c9f
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
