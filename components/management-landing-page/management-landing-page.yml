---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:5ee5743557f8f76bdc8440c952d414b3a5a0ef4d2a7bd216e3c6a5a7eadc3ad9
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
