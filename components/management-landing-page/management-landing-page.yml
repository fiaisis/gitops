---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:c3b09cd9224d7e33d2f4dca567e7307639bbc230b6336cd7e5f3c1fdb14a89c4
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
