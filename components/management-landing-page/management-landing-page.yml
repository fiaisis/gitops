---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:822f282d14aff46827426237d04c0cd97a44876ee1abfdcd821ce2d01137260b
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
