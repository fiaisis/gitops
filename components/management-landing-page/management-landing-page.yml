---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:5ef1bded804cf186d65bf536138645391517d6c93256078621767a7ece16d0f2
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
