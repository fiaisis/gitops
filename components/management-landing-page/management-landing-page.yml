---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-landing-page
  namespace: landing-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-landing-page
  template:
    metadata:
      labels:
        app: management-landing-page
    spec:
      containers:
        - name: management-landing-page
          image: ghcr.io/fiaisis/management-landing-page@sha256:d1e8e5641ea6bbd20f8523e0623c5f307082dc20dbacc5810472f16d31d39868
          ports:
            - name: web-port
              protocol: TCP
              containerPort: 3000
