apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plotting-service
  namespace: fia
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: envoy-gateway
    namespace: envoy-gateway-system
    sectionName: https-main
  hostnames:
    - "dev.reduce.isis.cclrc.ac.uk"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /plottingapi
    backendRefs:
    - group: ''
      kind: Service
      name: plotting-service-service
      port: 80
      weight: 1